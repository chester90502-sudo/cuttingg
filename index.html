<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Produksi Cutting</title>
<style>
* { box-sizing: border-box; }

body{font-family:'Segoe UI',Arial;background:linear-gradient(135deg,#0f172a,#1e293b);padding:20px;color:#fff; margin: 0;}

h1{text-align:center;margin-bottom:20px;font-size:28px; color: #fff;}
h2{text-align:center;margin-bottom:15px;font-size:20px; color: #e2e8f0;}

.card{background:#1e293b;border-radius:18px;padding:25px;box-shadow:0 15px 35px rgba(0,0,0,0.5); margin-bottom: 20px;}

/* Tabel Operator */
.operator-card {
  background: linear-gradient(135deg, #1e293b, #334155);
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}

.operator-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 15px;
  margin-top: 15px;
}

.machine-box {
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 15px;
  border: 1px solid rgba(255,255,255,0.1);
}

.machine-title {
  font-weight: bold;
  font-size: 16px;
  color: #60a5fa;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 2px solid #3b82f6;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.operator-list-edit {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.operator-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
}

.operator-number {
  background: #3b82f6;
  color: white;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: bold;
}

.operator-name {
  flex: 1;
  color: #e2e8f0;
}

.operator-input {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid #475569;
  border-radius: 6px;
  background: #0f172a;
  color: #fff;
  font-size: 13px;
}

.operator-input:focus {
  outline: none;
  border-color: #3b82f6;
}

/* Tabel Produksi */
table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;background:#fff;color:#000;border-radius:12px}
th,td{border:1px solid #ddd;padding:8px;text-align:center;font-size:14px;min-width:80px}
th{background:#0f172a;color:#fff;position:sticky;top:0;z-index:5}

/* FREEZE */
.rankCol{position:sticky;left:0;background:#e2e8f0;z-index:6;font-weight:bold;min-width:50px}
.nameCol{position:sticky;left:50px;background:#f1f5f9;z-index:6;font-weight:bold;min-width:150px}
.typeCol{position:sticky;left:200px;background:#f8fafc;z-index:6;font-weight:bold;min-width:100px}
th.rankCol{left:0;z-index:7}
th.nameCol{left:50px;z-index:7}
th.typeCol{left:200px;z-index:7}

/* Warna status produksi */
.low{background:#ffb3b3}    /* < 1200 */
.mid{background:#ffe9a8}    /* 1201 - 1400 */
.high{background:#b6f5c2}   /* > 1400 */

/* Warna kode */
.code-p{background:#93c5fd !important; color:#1e3a8a !important; font-weight:bold}
.code-be{background:#fca5a5 !important; color:#7f1d1d !important; font-weight:bold}
.code-u{background:#86efac !important; color:#14532d !important; font-weight:bold}
.code-i{background:#fde047 !important; color:#713f12 !important; font-weight:bold}
.code-a{background:#f87171 !important; color:#7f1d1d !important; font-weight:bold}
.code-m{background:#c4b5fd !important; color:#5b21b6 !important; font-weight:bold}
.code-l{background:#fdba74 !important; color:#9a3412 !important; font-weight:bold}
.code-bs{background:#f0abfc !important; color:#86198f !important; font-weight:bold}

input{width:70px;padding:5px;font-size:13px;text-align:center}

.shiftRow{background:#64748b;font-weight:bold;color:#fff;font-size:16px}
.machineRow{background:#94a3b8;font-weight:bold;color:#000;font-size:14px}
.warning{font-weight:bold;color:#dc2626}

.login{text-align:center;margin-bottom:20px}
button{padding:10px 18px;background:#2563eb;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:14px}
button:hover{background:#1d4ed8}
button:active{transform: scale(0.98);}

.save-btn {
  background: #10b981;
  padding: 6px 12px;
  font-size: 12px;
  margin-top: 10px;
  width: 100%;
}

.save-btn:hover {
  background: #059669;
}

.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:15px;justify-content:center;font-size:11px}
.legend-item{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.1);padding:4px 8px;border-radius:15px}
.legend-color{width:16px;height:16px;border-radius:3px;border:1px solid rgba(255,255,255,0.3)}

.code-input{width:60px;text-align:center;text-transform:uppercase;font-weight:bold;font-size:12px}

.loading-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}
.loading-spinner {
  width: 50px;
  height: 50px;
  border: 5px solid #f3f3f3;
  border-top: 5px solid #3498db;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.toggle-btn {
  background: #4b5563;
  margin-bottom: 15px;
}

.toggle-btn:hover {
  background: #374151;
}

.hidden {
  display: none !important;
}

.admin-badge {
  background: #10b981;
  color: white;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  margin-left: 10px;
}

.view-only-badge {
  background: #ef4444;
  color: white;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  margin-left: 10px;
}
</style>
</head>
<body>

<h1>DASHBOARD PRODUKSI CUTTING</h1>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
</div>

<div class="login">
  <input type="password" id="pass" placeholder="Password Admin">
  <button onclick="login()">Login Admin</button>
  <span id="statusBadge"></span>
</div>

<!-- Section Nama Operator -->
<div class="operator-card" id="operatorSection">
  <h2>📋 DAFTAR NAMA OPERATOR PER MESIN</h2>
  <button class="toggle-btn" onclick="toggleOperatorEdit()">📝 Toggle Edit Mode</button>
  
  <div id="operatorView" class="operator-grid">
    <!-- Generated by JS -->
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-color low"></div>&lt;1200 (Rendah)</div>
  <div class="legend-item"><div class="legend-color mid"></div>1201-1400 (Sedang)</div>
  <div class="legend-item"><div class="legend-color high"></div>&gt;1400 (Tinggi)</div>
  <div class="legend-item"><div class="legend-color code-p"></div>P = Perbantuan</div>
  <div class="legend-item"><div class="legend-color code-be"></div>BE = Pulang Awal</div>
  <div class="legend-item"><div class="legend-color code-u"></div>U = UKS</div>
  <div class="legend-item"><div class="legend-color code-i"></div>I = Ijin</div>
  <div class="legend-item"><div class="legend-color code-a"></div>A = Alpa</div>
  <div class="legend-item"><div class="legend-color code-bs"></div>BS = Barang Sedikit</div>
</div>

<div class="card">
<div style="overflow:auto; max-height:75vh;">
<table>
<thead>
<tr>
<th class="rankCol">Rank</th>
<th class="nameCol">Shift / Mesin</th>
<th class="typeCol">Jenis</th>
<script>
for(let i=1;i<=31;i++){document.write("<th>"+i+"</th>")}
</script>
<th>%</th>
<th>SP</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3WEe4qb-QgpNYJuD_3zettZN8IFOfWVc",
  authDomain: "hasil-ec37d.firebaseapp.com",
  databaseURL: "https://hasil-ec37d-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hasil-ec37d",
  storageBucket: "hasil-ec37d.firebasestorage.app",
  messagingSenderId: "296148451757",
  appId: "1:296148451757:web:7041bb382da038f0e1a124"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const TARGET = 1400;
const TARGET_MID = 1200;
const ADMIN_PASS = "bangkumisganteng123";
let isAdmin = false;
let isOperatorEditMode = false;
let currentData = {};
let isRendering = false;
let pendingUpdate = null;

const VALID_CODES = ['P', 'BE', 'U', 'I', 'A', 'M', 'L', 'BS'];
const IGNORED_CODES = ['BS', 'BE', 'U', 'I', 'A', 'M', 'L'];

const shifts = ["SHIFT A","SHIFT B","SHIFT C"];
const machines = ["MESIN 1","MESIN 2","MESIN 3","MESIN 4","MESIN 5","MESIN 6"];
const operatorPerMachine = 7;

const inputTypes = [
  { key: 'cutting', label: 'CUTTING' },
  { key: 'pelubangan', label: 'PELUBANGAN' }
];

window.login = function(){
 if(document.getElementById("pass").value===ADMIN_PASS){
   isAdmin=true;
   document.getElementById('statusBadge').innerHTML = '<span class="admin-badge">✓ Admin Mode</span>';
   alert("Login berhasil! Anda dapat mengedit data.");
   renderOperators();
   render(currentData);
 }else{
   alert("Password salah");
 }
}

function toggleOperatorEdit() {
  if (!isAdmin) {
    alert("Silakan login sebagai admin terlebih dahulu!");
    return;
  }
  isOperatorEditMode = !isOperatorEditMode;
  renderOperators();
}

function showLoading() {
  document.getElementById('loadingOverlay').style.display = 'flex';
}

function hideLoading() {
  document.getElementById('loadingOverlay').style.display = 'none';
}

function getCodeClass(code) {
  if (!code) return '';
  const upperCode = code.toString().toUpperCase();
  if (VALID_CODES.includes(upperCode)) {
    return 'code-' + upperCode.toLowerCase();
  }
  return '';
}

function isValidCode(value) {
  if (!value) return false;
  const upperValue = value.toString().toUpperCase().trim();
  return VALID_CODES.includes(upperValue);
}

function getOperatorData(shift, machine, opNum) {
  let key = `${shift}_${machine}_OP${opNum}`;
  return currentData?.[key]?.nama || `OP${opNum}`;
}

function renderOperators() {
  const container = document.getElementById('operatorView');
  container.innerHTML = '';
  
  shifts.forEach(shift => {
    const shiftDiv = document.createElement('div');
    shiftDiv.style.marginBottom = '20px';
    shiftDiv.style.width = '100%';
    
    const shiftTitle = document.createElement('h3');
    shiftTitle.textContent = shift;
    shiftTitle.style.color = '#60a5fa';
    shiftTitle.style.marginBottom = '15px';
    shiftTitle.style.fontSize = '18px';
    shiftDiv.appendChild(shiftTitle);
    
    const machinesGrid = document.createElement('div');
    machinesGrid.className = 'operator-grid';
    
    machines.forEach(machine => {
      const machineBox = document.createElement('div');
      machineBox.className = 'machine-box';
      
      const title = document.createElement('div');
      title.className = 'machine-title';
      title.innerHTML = `<span>${machine}</span>`;
      machineBox.appendChild(title);
      
      const list = document.createElement('div');
      list.className = 'operator-list-edit';
      
      const inputs = []; // Simpan reference untuk save nanti
      
      for(let i=1; i<=operatorPerMachine; i++) {
        const item = document.createElement('div');
        item.className = 'operator-item';
        
        const num = document.createElement('div');
        num.className = 'operator-number';
        num.textContent = i;
        
        const currentName = getOperatorData(shift, machine, i);
        
        if (isOperatorEditMode && isAdmin) {
          const input = document.createElement('input');
          input.type = 'text';
          input.className = 'operator-input';
          input.value = currentName;
          input.placeholder = `Nama OP${i}`;
          input.dataset.shift = shift;
          input.dataset.machine = machine;
          input.dataset.op = i;
          inputs.push(input);
          item.appendChild(num);
          item.appendChild(input);
        } else {
          const name = document.createElement('div');
          name.className = 'operator-name';
          name.textContent = currentName;
          item.appendChild(num);
          item.appendChild(name);
        }
        
        list.appendChild(item);
      }
      
      machineBox.appendChild(list);
      
      // Tombol save untuk mode edit
      if (isOperatorEditMode && isAdmin) {
        const saveBtn = document.createElement('button');
        saveBtn.className = 'save-btn';
        saveBtn.textContent = '💾 Simpan Nama';
        saveBtn.onclick = function() {
          saveAllOperatorNames(inputs);
        };
        machineBox.appendChild(saveBtn);
      }
      
      machinesGrid.appendChild(machineBox);
    });
    
    shiftDiv.appendChild(machinesGrid);
    container.appendChild(shiftDiv);
  });
}

function saveAllOperatorNames(inputs) {
  showLoading();
  const updates = {};
  
  inputs.forEach(input => {
    const shift = input.dataset.shift;
    const machine = input.dataset.machine;
    const op = input.dataset.op;
    const name = input.value.trim() || `OP${op}`;
    
    const path = `cutting/${shift}_${machine}_OP${op}/nama`;
    updates[path] = name;
  });
  
  update(ref(db), updates)
    .then(() => {
      hideLoading();
      alert('Nama operator berhasil disimpan!');
      isOperatorEditMode = false;
      renderOperators();
    })
    .catch((error) => {
      hideLoading();
      console.error("Error saving:", error);
      alert("Gagal menyimpan: " + error.message);
    });
}

function render(data={}){
  if (isRendering) {
    pendingUpdate = data;
    return;
  }
  
  isRendering = true;
  currentData = data || {};
  
  requestAnimationFrame(() => {
    try {
      renderOperators();
      performRender();
    } finally {
      isRendering = false;
      if (pendingUpdate) {
        const update = pendingUpdate;
        pendingUpdate = null;
        render(update);
      }
    }
  });
}

function performRender() {
 const tbody=document.getElementById("body");
 tbody.innerHTML="";

 shifts.forEach(shift=>{
   const shiftRow = document.createElement('tr');
   shiftRow.className = 'shiftRow';
   shiftRow.innerHTML = `<td colspan='36'>${shift}</td>`;
   tbody.appendChild(shiftRow);

   let rankingData=[];

   machines.forEach(machine=>{
     const machineKey = `${shift}_${machine}`;
     
     // Ambil nama operator untuk ditampilkan
     const opNames = [];
     for(let i=1; i<=operatorPerMachine; i++) {
       opNames.push(getOperatorData(shift, machine, i));
     }
     
     const machineRow = document.createElement('tr');
     machineRow.className = 'machineRow';
     machineRow.innerHTML = `
       <td colspan='36'>
         ${machine}
         <div style="font-size: 11px; color: #475569; margin-top: 5px; font-weight: normal;">
           👥 ${opNames.join(', ')}
         </div>
       </td>
     `;
     tbody.appendChild(machineRow);

     inputTypes.forEach((type, typeIndex) => {
       let typeKey = `${machineKey}_${type.key}`;
       let typeData = currentData?.[typeKey] || {};

       let totalPercent=0;
       let count=0;
       let consecutiveLow=0;
       let maxConsecutiveLow=0;

       const row = document.createElement('tr');
       row.setAttribute('data-key', typeKey);
       
       const rankCell = document.createElement('td');
       rankCell.className = 'rankCol';
       rankCell.textContent = typeIndex === 0 ? '-' : '';
       row.appendChild(rankCell);

       const nameCell = document.createElement('td');
       nameCell.className = 'nameCol';
       nameCell.innerHTML = typeIndex === 0 ? `<div style="font-size:12px">${machine}</div>` : '';
       row.appendChild(nameCell);

       const typeCell = document.createElement('td');
       typeCell.className = 'typeCol';
       typeCell.textContent = type.label;
       row.appendChild(typeCell);

       for(let d=1; d<=31; d++){
         const dayData = typeData?.[d] || {};
         const val = dayData.hasil || 0;
         const code = dayData.kode || '';
         let cls="";
         let displayVal = val;
         
         if (code && isValidCode(code)) {
           displayVal = code.toUpperCase();
           cls = getCodeClass(code);
           const upperCode = code.toUpperCase();
           
           if (IGNORED_CODES.includes(upperCode)) {
             if (consecutiveLow > maxConsecutiveLow) maxConsecutiveLow = consecutiveLow;
             consecutiveLow = 0;
           }
         } else if (val > 0) {
           let p = val / TARGET * 100;
           
           if (val < 1200) { 
             cls = "low"; 
             consecutiveLow++; 
           } else if (val <= 1400) {
             if (consecutiveLow > maxConsecutiveLow) maxConsecutiveLow = consecutiveLow;
             consecutiveLow = 0;
             cls = "mid";
           } else {
             if (consecutiveLow > maxConsecutiveLow) maxConsecutiveLow = consecutiveLow;
             consecutiveLow = 0;
             cls = "high";
           }
           
           totalPercent += p; 
           count++;
         } else {
           if (consecutiveLow > maxConsecutiveLow) maxConsecutiveLow = consecutiveLow;
           consecutiveLow = 0;
         }

         const cell = document.createElement('td');
         cell.className = cls;
         
         if (isAdmin) {
           const input = document.createElement('input');
           input.type = 'text';
           input.className = 'code-input';
           input.value = displayVal === 0 ? '' : displayVal;
           input.placeholder = '0/BS';
           input.onchange = function() { 
             clearTimeout(this.saveTimeout);
             this.saveTimeout = setTimeout(() => {
               saveData(typeKey, d, this.value);
             }, 300);
           };
           cell.appendChild(input);
         } else {
           cell.textContent = displayVal === 0 ? '' : displayVal;
         }
         
         row.appendChild(cell);
       }

       if (consecutiveLow > maxConsecutiveLow) maxConsecutiveLow = consecutiveLow;

       let avg = count ? (totalPercent / count).toFixed(1) : 0;
       
       if (typeIndex === 0) {
         rankingData.push({
           key: machineKey, 
           avg: Number(avg), 
           machine: machine,
           cuttingAvg: Number(avg)
         });
       } else {
         let entry = rankingData.find(r => r.key === machineKey);
         if (entry) {
           entry.pelubanganAvg = Number(avg);
           entry.avg = ((entry.cuttingAvg + Number(avg)) / 2).toFixed(1);
         }
       }

       let spText = "-";
       if (maxConsecutiveLow >= 3) {
         let spLevel = Math.floor(maxConsecutiveLow / 3);
         spText = "SP " + spLevel;
       }

       const percentCell = document.createElement('td');
       percentCell.textContent = avg + '%';
       row.appendChild(percentCell);
       
       const spCell = document.createElement('td');
       spCell.className = 'warning';
       spCell.textContent = spText;
       row.appendChild(spCell);
       
       tbody.appendChild(row);
     });
   });

   rankingData.sort((a, b) => b.avg - a.avg);
   rankingData.forEach((r, index) => {
     const cuttingRow = document.querySelector(`tr[data-key='${r.key}_cutting']`);
     if (cuttingRow) { 
       cuttingRow.children[0].innerText = index + 1; 
     }
   });
 });
}

window.saveData = function(machineTypeKey, day, value) {
  showLoading();
  const upperValue = value.toString().toUpperCase().trim();
  
  let updateData;
  
  if (isValidCode(upperValue)) {
    updateData = {
      hasil: 0,
      kode: upperValue
    };
  } else {
    const numValue = Number(value) || 0;
    updateData = {
      hasil: numValue,
      kode: ''
    };
  }
  
  set(ref(db, 'cutting/' + machineTypeKey + '/' + day), updateData)
    .then(() => {
      hideLoading();
    })
    .catch((error) => {
      hideLoading();
      console.error("Error saving:", error);
      alert("Gagal menyimpan data: " + error.message);
    });
}

let initialLoad = true;
onValue(ref(db, 'cutting'), (snap) => {
  if (initialLoad) {
    initialLoad = false;
    hideLoading();
  }
  render(snap.val());
}, (error) => {
  console.error("Firebase error:", error);
  hideLoading();
  alert("Error memuat data: " + error.message);
});

showLoading();

</script>

</body>
</html>
